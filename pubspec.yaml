name: nexo_app
description: NEXO — Ecosistema financiero circular para estudiantes y comercios informales
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Fuente Poppins — descargar desde Google Fonts y poner en assets/fonts/
  # O usar el paquete google_fonts (recomendado para rapidez):
  # Agrega: google_fonts: ^6.1.0 en dependencies y quita la sección fonts de abajo
  # Luego en app_theme.dart cambia fontFamily a GoogleFonts.poppins().fontFamily

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
